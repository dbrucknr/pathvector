# Cross.toml — configuration for the `cross` cross-compilation tool.
#
# `cross` is a drop-in replacement for `cargo` that builds Rust code inside
# a Docker container pre-configured with a foreign-architecture toolchain.
# We use it to produce aarch64-unknown-linux-musl binaries from a GitHub
# Actions x86_64 runner.
#
# The default cross images do not include `protoc`, but prost-build's build.rs
# shells out to `protoc` at compile time to generate Rust from .proto files.
# The `pre-build` hook installs it inside the container before cargo runs.
#
# protoc comes from a pinned upstream release, not `apt-get install
# protobuf-compiler` — the cross image's base OS is old enough that its apt
# repo only has protoc < 3.15, which predates proto3's `optional` field
# support (RFC: "Explicit 'optional' labels are disallowed in the Proto3
# syntax"). management.proto uses `optional` deliberately (prost maps it to
# Option<T> for real field-presence tracking, e.g. local_pref/med/aggregator),
# so the fix is a modern protoc, not removing `optional` from the .proto.
# protoc here runs on the container's own (x86_64) host architecture as a
# build-time tool — it does not need to match the aarch64-musl target triple.

[target.aarch64-unknown-linux-musl]
pre-build = [
    "apt-get update",
    "apt-get install -y --no-install-recommends curl unzip",
    "curl -fsSL -o /tmp/protoc.zip https://github.com/protocolbuffers/protobuf/releases/download/v35.1/protoc-35.1-linux-x86_64.zip",
    "unzip -o /tmp/protoc.zip -d /usr/local",
    "rm /tmp/protoc.zip",
]
