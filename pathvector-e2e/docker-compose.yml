# Manual development / debugging environment for pathvector-e2e.
#
# Starts gobgpd and pathvectord on a shared bridge network so BGP runs
# container-to-container (no macOS Docker Desktop TCP proxy interference).
#
# A fixed subnet (172.20.0.0/24) with static IPs lets pathvectord.toml
# reference gobgpd by its known IP (172.20.0.10) without DNS lookup.
# pathvectord's PeerConfig.address field is Ipv4Addr, so a hostname would
# not parse.
#
# Usage:
#   just e2e-up        # build images and start services
#   just e2e-down      # stop and remove containers
#   just e2e-logs      # stream combined logs
#
# The automated test suite uses testcontainers and does NOT use this file —
# it manages its own per-test containers for isolation.  This compose file is
# purely for interactive inspection and debugging.

services:
  gobgpd:
    build:
      context: ..
      dockerfile: pathvector-e2e/Dockerfile
      args:
        TARGETARCH: ${ARCH:-arm64}
    image: pathvector-gobgpd-test:latest
    volumes:
      - ./fixtures/gobgp.toml:/etc/gobgp/gobgpd.conf:ro
    networks:
      bgp-net:
        ipv4_address: 172.20.0.10

  pathvectord:
    build:
      context: ..
      dockerfile: pathvector-e2e/Dockerfile.pathvectord
    image: pathvector-e2e:latest
    volumes:
      - ./fixtures/pathvectord.toml:/etc/pathvectord.toml:ro
    command: ["/etc/pathvectord.toml"]
    ports:
      # Expose the gRPC management API to the host for manual inspection.
      # HTTP/2 is unaffected by the macOS Docker Desktop TCP proxy.
      - "51200:51200"
    depends_on:
      gobgpd:
        condition: service_healthy
    networks:
      bgp-net:
        ipv4_address: 172.20.0.11

networks:
  bgp-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
